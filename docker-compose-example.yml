version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suderlight
    restart: always
    ports:
      - "443:443"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - STORAGE_MODE=fs
      - API_PREFIX=/api
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-YOUR_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - PLAYER_SIGNATURE_SECRET=${PLAYER_SIGNATURE_SECRET:-i-dont-have-enough-credit-to-make-this-game}
    volumes:
      - suderlight_data:/app/server/data

volumes:
  suderlight_data:
