version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suderlight_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-YOUR_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma4:e2b
      - PLAYER_SIGNATURE_SECRET=YOUR_SECRET_KEY
      - PLAYER_SIGNATURE_MAX_SKEW_MS=300000
      - CORS_ORIGIN=http://localhost:8483,http://localhost:3000,https://your.site.com
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SIGNATURE_SECRET: "YOUR_SECRET_KEY"
    container_name: suderlight_web
    environment:
      - VITE_SIGNATURE_SECRET=YOUR_SECRET_KEY
    restart: always
    ports:
      - "8483:8483"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./cert:/app/cert

