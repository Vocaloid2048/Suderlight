version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suderlight
    restart: always
    ports:
      - "${PORT:-80}:80"
      - "443:443"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - STORAGE_MODE=fs
      - API_PREFIX=/api
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-YOUR_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
    # 持久化玩家数据 (saves + memories)，静态数据由镜像提供
    volumes:
      - suderlight_data:/app/server/data

volumes:
  suderlight_data:
