version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suderlight_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-YOUR_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma4:e2b
    volumes:
      - ./backend/data:/app/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suderlight_web
    restart: always
    ports:
      # 主機Port:容器Port
      # 根據需求 PORT = 8483 -> 8483 進行映射
      - "8483:8483"
    environment:
      - PORT=8483
    depends_on:
      - backend
    # 如果需要用到 HTTPS 憑證或環境變數檔可以掛載進來
    volumes:
      - ./cert:/app/cert

